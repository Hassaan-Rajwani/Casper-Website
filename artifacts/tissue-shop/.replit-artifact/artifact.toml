kind = "web"
previewPath = "/"
title = "Tissue Paper Shop"
version = "1.0.0"
id = "artifacts/tissue-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24134

[services.development]
run = "pnpm --filter @workspace/tissue-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tissue-shop", "run", "build" ]
publicDir = "artifacts/tissue-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24134"
BASE_PATH = "/"
